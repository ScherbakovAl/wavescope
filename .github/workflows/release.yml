name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN: wavelet_sonnet
  APP_NAME: Wavelet Audio Analyzer

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: windows-latest
            name: windows-x86_64
          - os: macos-14
            name: macos-universal
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgl1-mesa-dev

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME}"      >> "$GITHUB_OUTPUT"
          echo "plist=${GITHUB_REF_NAME#v}"       >> "$GITHUB_OUTPUT"

      # -------- Linux --------
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo build --locked --release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/release -czf \
            "dist/${BIN}-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz" "${BIN}"

      # -------- Windows --------
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --locked --release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/release/$env:BIN.exe" `
            -DestinationPath "dist/$env:BIN-${{ steps.ver.outputs.version }}-windows-x86_64.zip"

      # -------- macOS (universal .app) --------
      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build universal binary (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo build --locked --release --target aarch64-apple-darwin
          cargo build --locked --release --target x86_64-apple-darwin
          lipo -create -output "target/${BIN}-universal" \
            "target/aarch64-apple-darwin/release/${BIN}" \
            "target/x86_64-apple-darwin/release/${BIN}"

      - name: Package (macOS .app)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          APP="dist/${APP_NAME}.app"
          mkdir -p "${APP}/Contents/MacOS" "${APP}/Contents/Resources"
          sed "s/__VERSION__/${{ steps.ver.outputs.plist }}/g" \
            packaging/macos/Info.plist > "${APP}/Contents/Info.plist"
          cp "target/${BIN}-universal" "${APP}/Contents/MacOS/${BIN}"
          chmod +x "${APP}/Contents/MacOS/${BIN}"
          ( cd dist && zip -ry \
            "${BIN}-${{ steps.ver.outputs.version }}-macos-universal.zip" "${APP_NAME}.app" )
          rm -rf "${APP}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
